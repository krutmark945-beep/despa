<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>despa — Продажа готовых сайтов</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a; color: #fff;
            overflow: hidden; width: 100vw; height: 100vh;
        }

        /* Particles */
        .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .particle {
            position: absolute; border-radius: 50%;
            background: rgba(0,223,206,0.4);
            animation: pFloat linear infinite;
        }
        @keyframes pFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* Fog */
        .fog {
            position: fixed; border-radius: 50%;
            filter: blur(120px); pointer-events: none; z-index: 0;
        }
        .fog-1 { width: 600px; height: 400px; top: -10%; left: -5%; background: rgba(0,223,206,0.07); }
        .fog-2 { width: 500px; height: 350px; bottom: -10%; right: -5%; background: rgba(48,65,241,0.06); }

        /* Slides */
        .slide {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
            z-index: 1;
        }
        .slide.active { opacity: 1; pointer-events: auto; }

        /* S1 — Logo */
        .s1-logo {
            font-size: clamp(5rem, 14vw, 12rem);
            font-weight: 900; letter-spacing: -4px;
            background: linear-gradient(135deg, #00dfce, #3041f1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }
        .s1-line {
            width: 0; height: 2px; margin-top: 20px;
            background: linear-gradient(90deg, #00dfce, #3041f1);
            transition: width 0.8s cubic-bezier(.23,1,.32,1) 0.3s;
        }
        .slide.active .s1-line { width: 180px; }
        .s1-sub {
            margin-top: 18px; font-size: clamp(0.85rem, 2vw, 1.1rem);
            font-weight: 600; color: #666;
            letter-spacing: 4px; text-transform: uppercase;
            opacity: 0; transform: translateY(8px);
            transition: all 0.5s ease 0.6s;
        }
        .slide.active .s1-sub { opacity: 1; transform: translateY(0); }

        /* S2 — Headline */
        .s2-wrap { text-align: center; }
        .s2-line {
            display: block; overflow: hidden;
            font-size: clamp(2rem, 6vw, 4.5rem);
            font-weight: 900; line-height: 1.2;
            text-transform: uppercase;
        }
        .s2-line span {
            display: inline-block;
            transform: translateY(110%);
            transition: transform 0.6s cubic-bezier(.23,1,.32,1);
        }
        .slide.active .s2-line:nth-child(1) span { transition-delay: 0.1s; transform: translateY(0); }
        .slide.active .s2-line:nth-child(2) span { transition-delay: 0.2s; transform: translateY(0); }
        .slide.active .s2-line:nth-child(3) span { transition-delay: 0.3s; transform: translateY(0); }
        .accent { color: #00dfce; }
        .muted { color: #555; font-size: 0.55em; }

        /* S3 — Features */
        .s3-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            max-width: 520px; width: 90%;
        }
        .s3-item {
            padding: 24px 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            display: flex; align-items: center; gap: 14px;
            opacity: 0; transform: translateY(20px) scale(0.95);
            transition: all 0.45s cubic-bezier(.23,1,.32,1);
        }
        .slide.active .s3-item { opacity: 1; transform: translateY(0) scale(1); }
        .slide.active .s3-item:nth-child(1) { transition-delay: 0.1s; }
        .slide.active .s3-item:nth-child(2) { transition-delay: 0.2s; }
        .slide.active .s3-item:nth-child(3) { transition-delay: 0.3s; }
        .slide.active .s3-item:nth-child(4) { transition-delay: 0.4s; }
        .s3-icon {
            width: 42px; height: 42px; border-radius: 12px;
            background: rgba(0,223,206,0.08);
            border: 1px solid rgba(0,223,206,0.15);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .s3-icon svg { width: 20px; height: 20px; color: #00dfce; }
        .s3-text { font-size: 0.95rem; font-weight: 700; }

        /* S4 — Prices */
        .s4-cards { display: flex; gap: 16px; }
        .s4-card {
            width: 180px; padding: 28px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 18px; text-align: center;
            opacity: 0; transform: perspective(500px) rotateY(40deg);
            transition: all 0.55s cubic-bezier(.23,1,.32,1);
        }
        .slide.active .s4-card { opacity: 1; transform: perspective(500px) rotateY(0deg); }
        .slide.active .s4-card:nth-child(1) { transition-delay: 0.1s; }
        .slide.active .s4-card:nth-child(2) { transition-delay: 0.2s; }
        .slide.active .s4-card:nth-child(3) { transition-delay: 0.3s; }
        .s4-card.pop {
            border-color: rgba(0,223,206,0.25);
            background: rgba(0,223,206,0.04);
        }
        .s4-card h3 { font-size: 0.85rem; font-weight: 800; color: #888; margin-bottom: 10px; }
        .s4-card .num {
            font-size: 2.2rem; font-weight: 900;
            background: linear-gradient(135deg, #00dfce, #3041f1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .s4-card .sub { font-size: 0.72rem; color: #555; margin-top: 6px; }

        /* S5 — CTA */
        .s5-btn {
            display: inline-flex; align-items: center; gap: 12px;
            padding: 20px 48px; border-radius: 100px;
            background: linear-gradient(135deg, #00dfce, #3041f1);
            color: #fff; font-size: 1.15rem; font-weight: 800;
            border: none; cursor: pointer;
            opacity: 0; transform: scale(0.7);
            transition: all 0.5s cubic-bezier(.34,1.56,.64,1) 0.15s;
        }
        .slide.active .s5-btn { opacity: 1; transform: scale(1); }
        .s5-btn svg { width: 22px; height: 22px; }
        .s5-contact {
            margin-top: 20px; font-size: 1rem; font-weight: 700;
            color: #555; letter-spacing: 1px;
            opacity: 0; transform: translateY(8px);
            transition: all 0.4s ease 0.4s;
        }
        .slide.active .s5-contact { opacity: 1; transform: translateY(0); }
        .s5-trust {
            margin-top: 14px; font-size: 0.78rem; color: #444;
            opacity: 0;
            transition: opacity 0.4s ease 0.55s;
        }
        .slide.active .s5-trust { opacity: 1; }

        /* Progress */
        .progress {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 3px; background: rgba(255,255,255,0.04);
            z-index: 10;
        }
        .progress-fill {
            height: 100%; width: 0;
            background: linear-gradient(90deg, #00dfce, #3041f1);
            transition: width 0.1s linear;
        }

        /* Dots */
        .dots {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 8px; z-index: 10;
        }
        .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: rgba(255,255,255,0.12);
            transition: all 0.3s ease;
        }
        .dot.on { background: #00dfce; transform: scale(1.5); }
    </style>
</head>
<body>

<div class="fog fog-1"></div>
<div class="fog fog-2"></div>
<div class="particles" id="particles"></div>

<!-- S1 -->
<div class="slide active" id="s1">
    <div class="s1-logo">despa</div>
    <div class="s1-line"></div>
    <div class="s1-sub">продажа готовых сайтов</div>
</div>

<!-- S2 -->
<div class="slide" id="s2">
    <div class="s2-wrap">
        <span class="s2-line"><span>Готовый <span class="accent">сайт</span></span></span>
        <span class="s2-line"><span>за <span class="accent">24 часа</span></span></span>
        <span class="s2-line"><span class="muted"><span>под ключ</span></span></span>
    </div>
</div>

<!-- S3 -->
<div class="slide" id="s3">
    <div class="s3-grid">
        <div class="s3-item">
            <div class="s3-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            </div>
            <div class="s3-text">От 1 дня</div>
        </div>
        <div class="s3-item">
            <div class="s3-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4 12 14.01l-3-3"/></svg>
            </div>
            <div class="s3-text">Под ключ</div>
        </div>
        <div class="s3-item">
            <div class="s3-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/></svg>
            </div>
            <div class="s3-text">Уникальный дизайн</div>
        </div>
        <div class="s3-item">
            <div class="s3-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <div class="s3-text">Честные цены</div>
        </div>
    </div>
</div>

<!-- S4 -->
<div class="slide" id="s4">
    <div class="s4-cards">
        <div class="s4-card">
            <h3>Лендинг</h3>
            <div class="num">500 ₽</div>
            <div class="sub">до 5 блоков</div>
        </div>
        <div class="s4-card pop">
            <h3>Базовый</h3>
            <div class="num">1 000 ₽</div>
            <div class="sub">каталог + корзина</div>
        </div>
        <div class="s4-card">
            <h3>Магазин</h3>
            <div class="num">2 500 ₽</div>
            <div class="sub">полный функционал</div>
        </div>
    </div>
</div>

<!-- S5 -->
<div class="slide" id="s5">
    <div class="s5-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        Написать в Telegram
    </div>
    <div class="s5-contact">@zxc_qweazdgn</div>
    <div class="s5-trust">Обязательно скинем весь код для сайта</div>
</div>

<div class="progress"><div class="progress-fill" id="pf"></div></div>
<div class="dots" id="dots"></div>

<script>
(function() {
    // Particles
    const pc = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = 1.5 + Math.random() * 2.5;
        p.style.width = p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (4 + Math.random() * 6) + 's';
        p.style.animationDelay = Math.random() * 5 + 's';
        p.style.opacity = 0.2 + Math.random() * 0.4;
        pc.appendChild(p);
    }

    const slides = document.querySelectorAll('.slide');
    const dotsEl = document.getElementById('dots');
    const pf = document.getElementById('pf');
    const interval = 4000;
    const total = slides.length;
    let cur = 0, timer = null, progressTimer = null;

    // Dots
    slides.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'dot' + (i === 0 ? ' on' : '');
        dotsEl.appendChild(d);
    });

    function updateProgress() {
        pf.style.width = '0%';
        let start = performance.now();
        function tick(now) {
            const elapsed = now - start;
            const pct = Math.min((elapsed / interval) * 100, 100);
            pf.style.width = pct + '%';
            if (pct < 100) progressTimer = requestAnimationFrame(tick);
        }
        progressTimer = requestAnimationFrame(tick);
    }

    function go(n) {
        if (n === cur && slides[cur].classList.contains('active')) return;
        slides[cur].classList.remove('active');
        dotsEl.children[cur].classList.remove('on');
        cur = (n + total) % total;
        slides[cur].classList.add('active');
        dotsEl.children[cur].classList.add('on');
        updateProgress();
    }

    function next() { go(cur + 1); }

    function startAuto() {
        clearInterval(timer);
        updateProgress();
        timer = setInterval(next, interval);
    }

    startAuto();

    dotsEl.querySelectorAll('.dot').forEach((d, i) => {
        d.addEventListener('click', () => {
            go(i);
            startAuto();
        });
    });

    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(cur + 1); startAuto(); }
        if (e.key === 'ArrowLeft') { go(cur - 1); startAuto(); }
    });
})();
</script>
</body>
</html>
